apiVersion: v1
data:
  alerts.rules.yml: |
    groups:
      - name: cloud-native-ai-hrms.rules
        rules:
          - alert: ServiceDown
            expr: up{job=~"gateway|auth-service|employee-service|aiops-service"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} target is down for more than 1 minute."

          - alert: High5xxErrors
            expr: sum(rate({__name__=~"gateway_service_http_requests_total|auth_service_http_requests_total|employee_service_http_requests_total|aiops_service_http_requests_total",status_code=~"5.."}[1m])) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "HTTP 5xx errors detected"
              description: "One or more services are returning 5xx errors."

          - alert: High4xxErrors
            expr: sum(rate({__name__=~"gateway_service_http_requests_total|auth_service_http_requests_total|employee_service_http_requests_total|aiops_service_http_requests_total",status_code=~"4.."}[1m])) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "HTTP 4xx errors detected"
              description: "One or more services are returning 4xx errors."

          - alert: HighCPUUsage
            expr: rate(process_cpu_user_seconds_total[1m]) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High process CPU usage"
              description: "A service process CPU usage is high."

          - alert: HighMemoryUsage
            expr: process_resident_memory_bytes / 1024 / 1024 > 200
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage"
              description: "A service is using more than 200MB memory."
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: cloud-native-ai-hrms
