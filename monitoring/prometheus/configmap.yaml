apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloud-native-ai-hrms
  labels:
    app: prometheus

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'gateway'
        metrics_path: /metrics
        static_configs:
          - targets: ['gateway-service:8080']
      - job_name: 'auth-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['auth-service:4001']
      - job_name: 'employee-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['employee-service:4002']
      - job_name: 'aiops-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['aiops-service:4003']
