apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: cloud-native-ai-hrms
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki-service:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # add Kubernetes metadata as labels
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          # set the log file path for each pod/container
          - source_labels: [__meta_kubernetes_pod_name, __meta_kubernetes_container_name]
            regex: (.*);(.*)
            replacement: /var/log/pods/*/*/*.log
            target_label: __path__
          # catch container logs (alternative location)
          - source_labels: [__meta_kubernetes_container_name]
            regex: .*
            replacement: /var/log/containers/*.log
            target_label: __path__
        pipeline_stages:
          - json:
              expressions:
                level: level
                msg: message
