apiVersion: v1
data:
  prometheus-datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: cloud-native-ai-hrms
