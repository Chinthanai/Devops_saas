apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-exporter
  namespace: cloud-native-ai-hrms
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-exporter
rules:
  - apiGroups: [""]
    resources: ["nodes","nodes/proxy"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-exporter
subjects:
  - kind: ServiceAccount
    name: node-exporter
    namespace: cloud-native-ai-hrms
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-exporter
