apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: cloud-native-ai-hrms
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: "null"
