apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cloud-native-ai-hrms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: devops_saas-auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4001
        env:
        - name: PORT
          value: "4001"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 15
          periodSeconds: 20
