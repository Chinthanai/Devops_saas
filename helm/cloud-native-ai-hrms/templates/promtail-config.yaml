apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: cloud-native-ai-hrms
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki-service:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/containers/*cloud-native-ai-hrms*.log

        pipeline_stages:
          - cri: {}

        relabel_configs:
          - source_labels: [__path__]
            regex: .*/([^_]+)_([^_]+)_([^-.]+)-.*\.log
            target_label: pod
          - source_labels: [__path__]
            regex: .*/([^_]+)_([^_]+)_([^-.]+)-.*\.log
            target_label: namespace
            replacement: cloud-native-ai-hrms
          - source_labels: [__path__]
            regex: .*/([^_]+)_([^_]+)_([^-.]+)-.*\.log
            target_label: container
