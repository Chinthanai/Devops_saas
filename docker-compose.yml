version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hrms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  employee-service:
    build: ./services/employee-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  aiops-service:
    build: ./services/aiops-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-service:
    build: ./services/gateway-service
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:4001
      - EMPLOYEE_SERVICE_URL=http://employee-service:4002
      - AIOPS_SERVICE_URL=http://aiops-service:4003
    depends_on:
      - auth-service
      - employee-service
      - aiops-service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - gateway-service

volumes:
  pgdata:
